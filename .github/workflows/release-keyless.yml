name: release-keyless

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

  release:
    name: build-sign-release
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build stripped distribution layout
        shell: bash
        run: make dist VERSION="${GITHUB_REF_NAME}"

      - name: Install cosign
        uses: sigstore/cosign-installer@v3.7.0

      - name: Keyless sign checksums
        shell: bash
        run: |
          set -euo pipefail
          cosign sign-blob \
            --yes \
            --output-signature "dist/releases/${GITHUB_REF_NAME}/SHA256SUMS.sig" \
            --output-certificate "dist/releases/${GITHUB_REF_NAME}/SHA256SUMS.pem" \
            "dist/releases/${GITHUB_REF_NAME}/SHA256SUMS"

      - name: Verify signed checksums
        shell: bash
        run: |
          set -euo pipefail
          cosign verify-blob \
            --certificate "dist/releases/${GITHUB_REF_NAME}/SHA256SUMS.pem" \
            --signature "dist/releases/${GITHUB_REF_NAME}/SHA256SUMS.sig" \
            --certificate-identity-regexp "^https://github.com/${GITHUB_REPOSITORY}/\\.github/workflows/release-keyless\\.yml@refs/tags/${GITHUB_REF_NAME}$" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "dist/releases/${GITHUB_REF_NAME}/SHA256SUMS"

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/releases/${{ github.ref_name }}/*.tar.gz
            dist/releases/${{ github.ref_name }}/*.zip
            dist/releases/${{ github.ref_name }}/release.json
            dist/releases/${{ github.ref_name }}/SHA256SUMS
            dist/releases/${{ github.ref_name }}/SHA256SUMS.sig
            dist/releases/${{ github.ref_name }}/SHA256SUMS.pem
          generate_release_notes: true
